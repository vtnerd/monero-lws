    spend:
      description: |
        This object represents a single _possible_ spend
        
        `out_index` is a zero-based offset from the original received output. The variable within the monero codebase is the vout array, this is the index within that. It is needed for correct computation of the key_image.
        
        `mixin` does not include the real spend - this is the number of dummy inputs.
      type: object
      properties:
        amount:
          #description: "XMR possibly being spent"
          $ref: '#/components/schemas/uint64-string'
        key_image:
          #description: "Bytes of the key image"
          $ref: '#/components/schemas/binary32'
        tx_pub_key:
          description: Bytes of the ephermal tx public key
          allOf:
            - $ref: '#/components/schemas/binary32'
        out_index:
          description: Index (within vout vector) of source output
          allOf:
            - $ref: '#/components/schemas/uint16'
        mixin:
          #description: "Mixin of the spend"
          $ref: '#/components/schemas/uint32'
        sender:
          $ref: '#/components/schemas/address_meta'
      required:
        - amount
        - key_image
        - tx_pub_key
        - out_index
        - mixin
    transaction:
      description: |
        This object represents a single Transaction on the blockchain
        
        `id` is determined by the monero daemon. It is the offset that a transaction appears in the blockchain from the genesis block.
        
        `timestamp`, `height` and `block_hash` are not sent when `mempool` is true.
        
        `hash` is determined by how the monero core computes the hash.
        
        `spent_outputs` is the list of possible spends in this transaction only.
        
        `payment_id` is omitted if the transaction had none. It is decrypted when the encrypted form is used. The decryption may be incorrect - if the transaction was TO another address, then this will be random bytes. This happens frequently with outgoing payment ids; the received XMR in the transaction is change and the payment id is for the real recipient.
        
        `mixin` does not include the real spend - this is the number of decoy inputs.
      properties:
        id:
          description: "Index of tx in blockchain"
          allOf:
            - $ref: '#/components/schemas/uint64'
        hash:	
          #description: "Bytes of tx hash"
          $ref: '#/components/schemas/binary32'
        timestamp:
          $ref: '#/components/schemas/timestamp'
        total_received:
          #description: "Total XMR received"
          $ref: '#/components/schemas/uint64-string'
        total_sent:
          #description: "XMR possibly being spent"
          $ref: '#/components/schemas/uint64-string'
        unlock_time:
          #description: "Tx unlock time field"
          $ref: '#/components/schemas/uint64'
        block_hash:
          $ref: '#/components/schemas/binary32'
        height:
          description: Block height
          allOf:
            - $ref: '#/components/schemas/uint64'
        spent_outputs:
          description: List of possible spends
          type: array
          items:
            $ref: '#/components/schemas/spend'
        payment_id:
          $ref: '#/components/schemas/payment-id'
        coinbase:
          type: boolean
        mempool:
          type: boolean
        mixin:
          #description: "Mixin of the receive"
          $ref: '#/components/schemas/uint32'
      required:
        - id
        - hash
        - total_received
        - total_sent
        - unlock_time
        - spent_outputs
        - coinbase
        - mempool
        - mixin
    random_output:
      description: |
        A single random output, used for generating ring signatures.
        
        `global_index` is determined by the monero daemon. It is the offset from the first time the amount appeared in the blockchain. After ringct, this is the order of outputs as they appear in the blockchain.
      type: object
      properties:
        global_index:
          description: Index within amount
          allOf:
            - $ref: '#/components/schemas/uint64-string'
        public_key:
          #description: "Bytes of output public key"
          $ref: '#/components/schemas/binary32'
        rct:
          #description: "Bytes containing ringct commitment"
          $ref: '#/components/schemas/ringct-random'
      required:
        - global_index
        - public_key
    random_outputs:
      description: |
        `outputs` is omitted by the server if the amount does not have enough mixable outputs.
      type: object
      properties:
        amount:
          $ref: '#/components/schemas/uint64-string'
        outputs:
          description: Server selected ring
          type: array
          items:
            $ref: '#/components/schemas/random_output'
      required:
        - amount
        - outputs

